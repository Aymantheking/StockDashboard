services:
  postgres:
    build:
      context: ..
      dockerfile: docker/postgres.Dockerfile
    container_name: stock-dashboard-postgres
    environment:
      POSTGRES_DB: stock_dashboard
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - stock_dashboard_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d stock_dashboard"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile
    container_name: stock-dashboard-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: stock_dashboard
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_SYNC: "true"
      PORT: 3000
    command: sh -c "node dist/seed.js && node dist/main.js"
    ports:
      - "3000:3000"

volumes:
  stock_dashboard_pgdata:
